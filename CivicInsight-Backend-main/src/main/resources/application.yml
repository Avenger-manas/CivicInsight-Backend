spring:
  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: civicinsight
  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

groq:
  api:
    key: ${GROQ_API_KEY}
    url: https://api.groq.com/openai/v1/chat/completions

async:
  core-pool-size: 3
  max-pool-size: 10
  queue-capacity: 100

server:
  port: ${PORT:8080}
