spring:
  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: civicinsight
  mail:
    host: smtp-relay.brevo.com
    port: 2525
    username: ${BREVO_EMAIL}
    password: ${BREVO_SMTP_KEY}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8080}
